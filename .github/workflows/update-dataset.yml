name: Update Kaggle Dataset

on:
  schedule:
    # Runs every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout repo 
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python setup 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      #  Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Execute notebook 
      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=1200 \
            --ExecutePreprocessor.kernel_name=python3 \
            notebook.ipynb
        env:
          PYTHONUNBUFFERED: "1"

      # Verify output files were produced 
      - name: Verify outputs
        run: |
          for f in prevalence.csv suicide_rates.csv system_capacity.csv \
                   policy_financing.csv mental_health_panel.csv ml_features.csv README.md; do
            if [ -f "$f" ]; then
              echo "✅  $f  ($(wc -l < "$f") lines)"
            else
              echo "❌  $f  MISSING"
              exit 1
            fi
          done

      # Stage only the required output files
      - name: Stage output files
        run: |
          mkdir -p kaggle_upload
          cp prevalence.csv suicide_rates.csv system_capacity.csv \
             policy_financing.csv mental_health_panel.csv ml_features.csv \
             README.md kaggle_upload/

      # Push updated files to Kaggle dataset
      - name: Upload dataset to Kaggle
        run: |
          kaggle datasets version \
            --path kaggle_upload \
            --message "Auto-update $(date -u +%Y-%m-%d)" \
            --dir-mode zip
